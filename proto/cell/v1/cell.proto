syntax = "proto3";

package mmo.cell.v1;

import "game/v1/replication.proto";

option go_package = "mmo/gen/cellv1;cellv1";
option csharp_namespace = "Mmo.Cell.V1";

// Границы соты в плоскости XZ (как в doc.md).
message Bounds {
  double x_min = 1;
  double x_max = 2;
  double z_min = 3;
  double z_max = 4;
}

message CellSpec {
  string id = 1;
  int32 level = 2;
  Bounds bounds = 3;
  // gRPC адрес узла соты, куда клиент/шлюз подключаются напрямую.
  string grpc_endpoint = 4;
}

message RegisterRequest {
  CellSpec cell = 1;
}

message RegisterResponse {
  bool ok = 1;
  string error_message = 2;
}

message ListCellsRequest {}

message ListCellsResponse {
  repeated CellSpec cells = 1;
}

message ResolvePositionRequest {
  double x = 1;
  double z = 2;
}

message ResolvePositionResponse {
  CellSpec cell = 1;
  bool found = 2;
}

// Пустое сообщение для варианта oneof (noop).
message CellUpdateNoop {}

// Запрос диагностики перед сплитом: сота не меняет мир, возвращает план детей и счётчики (grid-manager / оператор).
message CellUpdateSplitPrepare {
  string reason = 1;
}

// Включить/выключить режим drain перед сплитом: новые Join отклоняются, уже вошедшие играют до Leave.
message CellUpdateSetSplitDrain {
  bool enabled = 1;
}

// Экспорт NPC для cold-handoff: JSON game.v1.CellPersist (сущности без игроков), см. runbook cold-cell-split.
message CellUpdateExportNpcPersist {
  string reason = 1;
}

// Импорт NPC на дочерней соте: тот же JSON game.v1.CellPersist. Только при отсутствии подключённых игроков.
message CellUpdateImportNpcPersist {
  string npc_import_json = 1;
  string reason = 2;
}

message UpdateRequest {
  oneof payload {
    CellUpdateNoop noop = 1;
    // Целевой TPS игрового цикла соты (grid-manager / админка).
    int32 set_target_tps = 2;
    CellUpdateSplitPrepare split_prepare = 3;
    CellUpdateSetSplitDrain set_split_drain = 4;
    CellUpdateExportNpcPersist export_npc_persist = 5;
    CellUpdateImportNpcPersist import_npc_persist = 6;
  }
}

message UpdateResponse {
  bool ok = 1;
  string message = 2;
  // При export_npc_persist: JSON mmo.game.v1.CellPersist (NPC-only).
  string npc_export_json = 3;
}

// Прокси команды Update на соту по logical id (grid-manager → cell-node).
message ForwardCellUpdateRequest {
  string cell_id = 1;
  UpdateRequest update = 2;
}

message ForwardCellUpdateResponse {
  bool ok = 1;
  string message = 2;
  string npc_export_json = 3;
}

// Оркестрация cold-handoff NPC: экспорт с родительской соты и импорт на дочернюю (тот же JSON).
// Дочерняя сота должна быть без подключённых игроков (см. Cell import_npc_persist).
message ForwardNpcHandoffRequest {
  string parent_cell_id = 1;
  string child_cell_id = 2;
  string reason = 3;
}

message ForwardNpcHandoffResponse {
  bool ok = 1;
  string message = 2;
  int32 npc_entity_count = 3;
}

// Registry — сервис обнаружения сот (заготовка Grid Manager / Consul-роли).
service Registry {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc ListCells(ListCellsRequest) returns (ListCellsResponse);
  rpc ResolvePosition(ResolvePositionRequest) returns (ResolvePositionResponse);
  rpc ForwardCellUpdate(ForwardCellUpdateRequest) returns (ForwardCellUpdateResponse);
  rpc ForwardNpcHandoff(ForwardNpcHandoffRequest) returns (ForwardNpcHandoffResponse);
}

message PingRequest {
  string client_id = 1;
}

message PingResponse {
  string cell_id = 1;
  int64 server_time_unix_ms = 2;
}

message JoinRequest {
  string player_id = 1;
}

message JoinResponse {
  bool ok = 1;
  string cell_id = 2;
  string message = 3;
  uint64 entity_id = 4;
}

message SubscribeDeltasRequest {
  uint64 from_tick = 1;
}

message ApplyInputRequest {
  string player_id = 1;
  mmo.game.v1.ClientInput input = 2;
}

message ApplyInputResponse {
  bool ok = 1;
  string message = 2;
}

message LeaveRequest {
  string player_id = 1;
}

message LeaveResponse {
  bool ok = 1;
  string message = 2;
}

// План четверичного сплита текущей соты (границы и level задаются на узле; grpc_endpoint задаётся при деплое дочернего пода).
message PlanSplitResponseChild {
  string id = 1;
  Bounds bounds = 2;
  int32 level = 3;
}

message PlanSplitRequest {
  // Опционально: причина / тикет для логов оператора.
  string reason = 1;
}

message PlanSplitResponse {
  repeated PlanSplitResponseChild children = 1;
}

// Кадр мира: снапшот или дельта (game.v1).
message WorldChunk {
  oneof kind {
    mmo.game.v1.Snapshot snapshot = 1;
    mmo.game.v1.Delta delta = 2;
  }
}

// Кандидаты для live-миграции / handoff между сотами (оператор, grid-manager).
message ListMigrationCandidatesRequest {
  string reason = 1;
}

message MigrationCandidate {
  uint64 entity_id = 1;
  mmo.game.v1.Vec3f position = 2;
  bool is_player = 3;
}

message ListMigrationCandidatesResponse {
  repeated MigrationCandidate candidates = 1;
}

// Cell — минимальный игровой узел соты (первая итерация).
service Cell {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc Join(JoinRequest) returns (JoinResponse);
  rpc Leave(LeaveRequest) returns (LeaveResponse);
  rpc ApplyInput(ApplyInputRequest) returns (ApplyInputResponse);
  rpc Update(UpdateRequest) returns (UpdateResponse);
  rpc PlanSplit(PlanSplitRequest) returns (PlanSplitResponse);
  rpc ListMigrationCandidates(ListMigrationCandidatesRequest) returns (ListMigrationCandidatesResponse);
  rpc SubscribeDeltas(SubscribeDeltasRequest) returns (stream WorldChunk);
}
