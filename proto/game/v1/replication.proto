syntax = "proto3";

package mmo.game.v1;

option go_package = "mmo/gen/gamev1;gamev1";
option csharp_namespace = "Mmo.Game.V1";

// Vec3f компактнее double для сети (чеклист: пакет < 1400 байт).
message Vec3f {
  float x = 1;
  float y = 2;
  float z = 3;
}

// ClientInput ввод с клиента (клавиши + прицел).
message ClientInput {
  uint32 seq = 1;
  uint32 input_mask = 2;
  float aim_yaw_deg = 3;
}

// EntityState запись для Snapshot / Delta.
message EntityState {
  uint64 entity_id = 1;
  Vec3f position = 2;
  uint32 flags = 3;
  float health_pct = 4;
}

// Snapshot полное состояние видимых сущностей.
message Snapshot {
  uint64 tick = 1;
  repeated EntityState entities = 2;
}

// Delta только изменившиеся сущности с прошлого кадра.
message Delta {
  uint64 tick = 1;
  uint64 from_tick = 2;
  repeated EntityState changed = 3;
}

// Сущность для персиста cell-node в Redis (позиция + скорость + здоровье).
message CellPersistEntity {
  uint64 entity_id = 1;
  Vec3f position = 2;
  Vec3f velocity = 3;
  uint32 flags = 4;
  float hp_cur = 5;
  float hp_max = 6;
}

// Снимок мира для восстановления после рестарта (игроки не мапятся по player_id — переподключаются).
message CellPersist {
  uint32 schema_version = 1;
  uint64 tick = 2;
  float loop_tps = 3;
  repeated CellPersistEntity entities = 4;
}
