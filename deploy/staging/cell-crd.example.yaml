apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cells.mmo.io
spec:
  group: mmo.io
  names:
    kind: Cell
    plural: cells
    singular: cell
    shortNames:
      - mcell
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [id, level, bounds]
              properties:
                id:
                  type: string
                level:
                  type: integer
                grpcPort:
                  type: integer
                  default: 50051
                metricsPort:
                  type: integer
                  default: 9090
                bounds:
                  type: object
                  required: [xMin, xMax, zMin, zMax]
                  properties:
                    xMin: { type: number }
                    xMax: { type: number }
                    zMin: { type: number }
                    zMax: { type: number }
            status:
              type: object
              properties:
                phase:
                  type: string
                message:
                  type: string
                serviceName:
                  type: string
